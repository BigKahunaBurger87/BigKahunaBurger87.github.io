<!-- Security: Referrer Policy -->
<meta name="referrer" content="strict-origin-when-cross-origin"/>

<!-- Security: Content Security Policy -->
<!-- GitHub Pages cannot set HTTP headers; this meta-tag CSP is best available.       -->
<!-- X-Frame-Options, X-Content-Type-Options, Permissions-Policy require HTTP headers -->
<!-- and cannot be set on GitHub Pages.                                                -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src  'self';
  style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src    'self' https://fonts.gstatic.com;
  img-src     'self' https://raw.githubusercontent.com https://hits.sh data: https:;
  connect-src 'self';
  frame-src   'none';
  object-src  'none';
  base-uri    'self';
  form-action 'self';
  frame-ancestors 'none';
  upgrade-insecure-requests;
"/>

  #view-counter:hover { opacity:1; }
