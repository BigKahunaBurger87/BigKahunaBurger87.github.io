baseURL = 'https://BigKahunaBurger87.github.io/'
languageCode = 'en-us'
title = 'BigKahunaBurger87'
theme = 'PaperMod'

[author]
    name = "BigKahunaBurger87"

[params]
    defaultTheme = "dark"
    disableThemeToggle = true
    author = "BigKahunaBurger87"
    ShowReadingTime = true
    ShowShareButtons = true
    ShowPostNavLinks = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true
    ShowToc = true
    
    [params.homeInfoParams]
        Title = "Welcome to BigKahunaBurger87's Security Blog"
        Content = "Here you'll find my HackTheBox walkthroughs, custom Python tools, and security research."

    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/BigKahunaBurger87"

[menu]
    [[menu.main]]
        identifier = "blog"
        name = "Blog"
        url = "/posts/"
        weight = 10
    [[menu.main]]
        identifier = "walkthroughs"
        name = "Walkthroughs"
        url = "/categories/htb-writeups/"
        weight = 20
    [[menu.main]]
        identifier = "tools"
        name = "Tools"
        url = "https://github.com/BigKahunaBurger87"
        weight = 30
        [menu.main.params]
            external = true
